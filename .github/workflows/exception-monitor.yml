name: Exception Log Monitor

on:
  schedule:
    - cron: "0 8 * * 1-5" # Every weekday at 08:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-and-create-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_FOUNDRY_RESOURCE }}
      LOG_ANALYTICS_WORKSPACE_ID: "a53c2ee0-9900-4756-b9c1-ab1b96a28d87"
      LOG_ANALYTICS_WORKSPACE_NAME: "law-snkm-p"
      LOG_ANALYTICS_RESOURCE_GROUP: "rg-snkm-shared-p"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}' 

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Login with Azure CLI
        run: |
          az login --service-principal \
            -u "$AZURE_CLIENT_ID" \
            -p "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID"
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Analyze exceptions and create issues
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_FOUNDRY_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            The Azure CLI (`az`) is installed and authenticated on this runner. Use it to query Log Analytics and then create GitHub issues.

            **Step 1: Query Log Analytics**

            Run this command to get the top 2 most frequent exceptions from the last 24 hours:

            ```
            az monitor log-analytics query \
              --workspace "a53c2ee0-9900-4756-b9c1-ab1b96a28d87" \
              --analytics-query "exceptions | where timestamp > ago(24h) | summarize Count=count(), LatestOccurrence=max(timestamp), EarliestOccurrence=min(timestamp) by problemId, type, outerMessage | top 2 by Count desc" \
              --output json
            ```

            **Step 2: Create GitHub issues**

            For each exception returned, create a GitHub issue. Follow these rules strictly:

            1. **Duplicate prevention**: Before creating any issue, list all existing open issues with the label "exception-monitor" using `gh issue list --label "exception-monitor" --state open`. If an open issue already exists with the same title, skip it.

            2. **Issue title format**: `[Exception] {type}: {problemId}`

            3. **Issue body**: For each exception, write the issue body with these sections:
               - **Exception Details**: A markdown table with Type, Problem ID, Message, Occurrences (24h), First Seen, Last Seen.
               - **AI Analysis**: As a senior software engineer, write a clear summary of what the error means and its likely root cause (2-3 sentences), then provide concrete actionable steps to fix or mitigate the issue as bullet points, and a severity assessment (Critical/High/Medium/Low) with justification.
               - **Source**: Log Analytics Workspace: law-snkm-p, Resource Group: rg-snkm-shared-p
               - **Next Steps**: 1) Review the AI analysis above, 2) Investigate root cause in Application Insights, 3) Check recent deployments, 4) Close when resolved.
               - Footer: "*Automatically created by the Exception Log Monitor workflow*"

            4. **Labels**: Add both "exception-monitor" and "bug" labels to each issue.

            5. If the query result is empty or not valid JSON, log a message and do nothing.

            Use the GitHub CLI (`gh`) to create issues.

            Use the GitHub CLI (`gh`) to list existing issues and create new ones.
